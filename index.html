<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The 9th Night</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <style>
    /* ── Variables ─────────────────────────────────────────────────── */
    :root {
      --bg:           #1c1c1e;
      --surface:      #252528;
      --surface2:     #2e2e32;
      --accent:       #2ab5a4;
      --accent-dark:  #1d8a7c;
      --accent-glow:  rgba(42, 181, 164, 0.14);
      --text:         #f0f0f0;
      --text-muted:   #777;
      --border:       rgba(42, 181, 164, 0.22);
    }

    /* ── Reset ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', Georgia, serif;
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Header ────────────────────────────────────────────────────── */
    header {
      text-align: center;
      padding: 3rem 2rem 2rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(42,181,164,0.06) 0%, transparent 100%);
      position: relative;
    }

    header::after {
      content: '';
      display: block;
      width: 60px;
      height: 2px;
      background: var(--accent);
      margin: 1.25rem auto 0;
      border-radius: 2px;
    }

    .novel-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .subtitle {
      margin-top: 0.4rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      color: var(--accent);
      text-transform: uppercase;
    }

    /* ── Config notice ─────────────────────────────────────────────── */
    .config-notice {
      max-width: 780px;
      margin: 1.25rem auto 0;
      padding: 0.7rem 1.25rem;
      background: rgba(42,181,164,0.07);
      border: 1px solid var(--border);
      border-radius: 7px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
    }

    .config-notice code {
      color: var(--accent);
      background: var(--surface);
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
    }

    /* ── Controls ──────────────────────────────────────────────────── */
    .controls {
      display: flex;
      gap: 0.8rem;
      align-items: center;
      max-width: 780px;
      margin: 1.5rem auto 0;
      padding: 0 1.5rem;
    }

    .search-wrap {
      flex: 1;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--accent);
      pointer-events: none;
      width: 16px;
      height: 16px;
    }

    #search {
      width: 100%;
      padding: 0.62rem 1rem 0.62rem 2.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #search::placeholder { color: var(--text-muted); }

    .sort-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.62rem 1.1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.18s, color 0.18s, border-color 0.18s;
      letter-spacing: 0.04em;
    }

    .sort-btn:hover {
      background: var(--accent);
      color: #0a1f1d;
      border-color: var(--accent);
    }

    .sort-icon { font-size: 1rem; line-height: 1; transition: transform 0.3s; }
    .sort-btn.asc .sort-icon { transform: rotate(180deg); }

    /* ── Chapter count ─────────────────────────────────────────────── */
    .chapter-meta {
      max-width: 780px;
      margin: 0.75rem auto 0;
      padding: 0 1.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    /* ── Chapter list ──────────────────────────────────────────────── */
    .chapter-list {
      max-width: 780px;
      margin: 1rem auto 0;
      padding: 0 1.5rem 5rem;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .chapter-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.4rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      transition: background 0.18s, border-color 0.18s, transform 0.18s;
      position: relative;
      overflow: hidden;
      animation: fadeSlide 0.35s both;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .chapter-item::before {
      content: '';
      position: absolute;
      inset: 0 auto 0 0;
      width: 3px;
      background: var(--accent);
      border-radius: 9px 0 0 9px;
      transform: scaleY(0);
      transition: transform 0.18s;
    }

    .chapter-item:hover {
      background: var(--surface2);
      border-color: var(--accent);
      transform: translateX(5px);
    }

    .chapter-item:hover::before { transform: scaleY(1); }

    .chapter-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent);
      min-width: 4.5rem;
      letter-spacing: 0.06em;
    }

    .chapter-name {
      flex: 1;
      font-size: 1.15rem;
      font-family: 'Crimson Pro', serif;
      font-weight: 600;
    }

    .chapter-arrow {
      color: var(--accent);
      opacity: 0.45;
      font-size: 1.1rem;
      transition: opacity 0.18s, transform 0.18s;
    }

    .chapter-item:hover .chapter-arrow { opacity: 1; transform: translateX(4px); }

    /* ── States ────────────────────────────────────────────────────── */
    .state-msg {
      text-align: center;
      padding: 3.5rem 1rem;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      line-height: 2;
    }

    .loading-dots::after {
      content: '';
      animation: dots 1.4s steps(4, end) infinite;
    }

    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
    }

    /* ── Reader view ───────────────────────────────────────────────── */
    #reader {
      display: none;
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.5rem 5rem;
    }

    .reader-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2.2rem;
      padding-bottom: 1.2rem;
      border-bottom: 1px solid var(--border);
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: none;
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      padding: 0.45rem 0.9rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.18s, color 0.18s, border-color 0.18s;
      flex-shrink: 0;
    }

    .back-btn:hover {
      background: var(--accent);
      color: #0a1f1d;
      border-color: var(--accent);
    }

    .reader-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Rendered Markdown ─────────────────────────────────────────── */
    .reader-body {
      font-size: 1.15rem;
      line-height: 1.95;
    }

    .reader-body h1,
    .reader-body h2,
    .reader-body h3,
    .reader-body h4 {
      font-family: 'Playfair Display', serif;
      color: var(--text);
      margin: 2rem 0 0.8rem;
      line-height: 1.25;
    }

    .reader-body h1 { font-size: 1.8rem; }
    .reader-body h2 { font-size: 1.45rem; color: var(--accent); }
    .reader-body h3 { font-size: 1.2rem; }

    .reader-body p { margin-bottom: 1.1rem; }

    .reader-body a { color: var(--accent); text-decoration: underline; }

    .reader-body blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.3rem 0 0.3rem 1.2rem;
      margin: 1rem 0;
      color: var(--text-muted);
      font-style: italic;
    }

    .reader-body code {
      background: var(--surface);
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.88em;
      color: var(--accent);
    }

    .reader-body pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      overflow-x: auto;
      margin: 1rem 0;
    }

    .reader-body pre code { background: none; padding: 0; }

    .reader-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    .reader-body ul, .reader-body ol {
      padding-left: 1.5rem;
      margin-bottom: 1rem;
    }

    .reader-body li { margin-bottom: 0.3rem; }

    /* ── Scroll to top ─────────────────────────────────────────────── */
    #scroll-top {
      position: fixed;
      bottom: 1.8rem;
      right: 1.8rem;
      background: var(--accent-dark);
      color: var(--text);
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      font-size: 1.2rem;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      transition: background 0.18s, transform 0.18s;
      z-index: 99;
    }

    #scroll-top.visible { display: flex; }
    #scroll-top:hover { background: var(--accent); transform: translateY(-2px); }
  </style>
</head>
<body>

<!-- ═══════════════════════════ INDEX VIEW ═══════════════════════════ -->
<div id="index-view">
  <header>
    <h1 class="novel-title" id="novel-title-el">My Light Novel</h1>
    <p class="subtitle">// chapter index</p>
  </header>

  <div class="config-notice" id="config-notice">
    ✎ Edit <code>GITHUB_USER</code>, <code>GITHUB_REPO</code>, and <code>NOVEL_TITLE</code> at the top of the &lt;script&gt; tag.
  </div>

  <div class="controls">
    <div class="search-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search" placeholder="Search by chapter number or name…" autocomplete="off" />
    </div>
    <button class="sort-btn" id="sort-btn" title="Toggle sort order">
      <span class="sort-icon">↑</span>
      <span id="sort-label">Newest First</span>
    </button>
  </div>

  <p class="chapter-meta" id="chapter-meta"></p>

  <div class="chapter-list" id="chapter-list">
    <div class="state-msg">
      <span class="loading-dots">Loading chapters</span>
    </div>
  </div>
</div>

<!-- ═══════════════════════════ READER VIEW ══════════════════════════ -->
<div id="reader">
  <div class="reader-header">
    <button class="back-btn" id="back-btn">← Back</button>
    <h2 class="reader-title" id="reader-title">Chapter</h2>
  </div>
  <div class="reader-body" id="reader-body"></div>
</div>

<!-- Scroll-to-top -->
<button id="scroll-top" aria-label="Scroll to top">↑</button>

<!-- Marked.js for Markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>

<script>
  // ╔══════════════════════════════════════════════════════╗
  // ║                    CONFIGURATION                     ║
  // ╠══════════════════════════════════════════════════════╣
  const GITHUB_USER  = 'the9thnight';   // ← your GitHub username
  const GITHUB_REPO  = 'the9thnight.github.io';       // ← your repository name
  const NOVEL_TITLE  = 'The 9th Night';  // ← your novel's title
  // ╚══════════════════════════════════════════════════════╝

  // Apply title
  document.getElementById('novel-title-el').textContent = NOVEL_TITLE;
  document.title = NOVEL_TITLE;

  // Hide config notice once user has set their own values
  if (GITHUB_USER !== 'YOUR_USERNAME') {
    document.getElementById('config-notice').style.display = 'none';
  }

  /* ── State ─────────────────────────────────────────────────────── */
  let allChapters = [];
  let sortAsc = false; // false = newest (highest number) first

  /* ── Helpers ───────────────────────────────────────────────────── */
  function extractNumber(filename) {
    const m = filename.match(/(\d+)/);
    return m ? parseInt(m[1], 10) : 0;
  }

  /**
   * "chapter1"    → "Chapter 1"
   * "chapter-12"  → "Chapter 12"
   * "chapter_42b" → "Chapter 42b"
   */
  function formatName(filename) {
    return filename
      .replace(/\.md$/i, '')           // strip .md
      .replace(/[-_]/g, ' ')           // dashes/underscores → spaces
      .replace(/([a-zA-Z])(\d)/g, '$1 $2')  // letterDigit → letter Digit
      .replace(/(\d)([a-zA-Z])/g, '$1 $2')  // digitLetter → digit Letter
      .replace(/\b\w/g, c => c.toUpperCase()) // Title Case
      .replace(/\s+/g, ' ')            // collapse extra spaces
      .trim();
  }

  /* ── Fetch chapter list from GitHub API ────────────────────────── */
  async function fetchChapters() {
    const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/chapters`;
    try {
      const res = await fetch(url, { headers: { Accept: 'application/vnd.github.v3+json' } });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || `HTTP ${res.status}`);
      }
      const files = await res.json();
      allChapters = files
        .filter(f => f.type === 'file' && /\.md$/i.test(f.name))
        .map(f => ({
          filename:    f.name,
          displayName: formatName(f.name),
          number:      extractNumber(f.name),
          rawUrl:      f.download_url,
        }));
      renderList();
    } catch (e) {
      document.getElementById('chapter-list').innerHTML =
        `<div class="state-msg">⚠ Could not load chapters.<br><small>${e.message}</small><br><br>
         Check that <code>GITHUB_USER</code> and <code>GITHUB_REPO</code> are set correctly,<br>
         your repo is public, and a <code>chapters/</code> folder exists.</div>`;
    }
  }

  /* ── Filter + sort ─────────────────────────────────────────────── */
  function getVisible() {
    const q = document.getElementById('search').value.trim().toLowerCase();
    let list = allChapters.slice();
    if (q) {
      list = list.filter(c =>
        c.number.toString().includes(q) ||
        c.displayName.toLowerCase().includes(q)
      );
    }
    list.sort((a, b) => sortAsc ? a.number - b.number : b.number - a.number);
    return list;
  }

  /* ── Render chapter list ───────────────────────────────────────── */
  function renderList() {
    const visible = getVisible();
    const meta = document.getElementById('chapter-meta');
    const container = document.getElementById('chapter-list');

    meta.textContent = allChapters.length
      ? `${visible.length} of ${allChapters.length} chapter${allChapters.length !== 1 ? 's' : ''}`
      : '';

    if (visible.length === 0) {
      container.innerHTML = allChapters.length
        ? '<div class="state-msg">No chapters match your search.</div>'
        : '<div class="state-msg">No .md files found in the chapters/ folder.</div>';
      return;
    }

    container.innerHTML = visible.map((c, i) => `
      <div
        class="chapter-item"
        role="button"
        tabindex="0"
        data-url="${c.rawUrl}"
        data-name="${c.displayName.replace(/"/g, '&quot;')}"
        style="animation-delay:${Math.min(i * 0.035, 0.5)}s"
      >
        <span class="chapter-num">CH.&nbsp;${String(c.number).padStart(3, '0')}</span>
        <span class="chapter-name">${c.displayName}</span>
        <span class="chapter-arrow">→</span>
      </div>
    `).join('');

    container.querySelectorAll('.chapter-item').forEach(el => {
      const open = () => openChapter(el.dataset.url, el.dataset.name);
      el.addEventListener('click', open);
      el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') open(); });
    });
  }

  /* ── Sort toggle ───────────────────────────────────────────────── */
  const sortBtn = document.getElementById('sort-btn');
  sortBtn.addEventListener('click', () => {
    sortAsc = !sortAsc;
    sortBtn.classList.toggle('asc', sortAsc);
    document.getElementById('sort-label').textContent = sortAsc ? 'Oldest First' : 'Newest First';
    renderList();
  });

  /* ── Search ────────────────────────────────────────────────────── */
  document.getElementById('search').addEventListener('input', renderList);

  /* ── Open a chapter in reader mode ────────────────────────────── */
  async function openChapter(rawUrl, name) {
    const indexView = document.getElementById('index-view');
    const reader    = document.getElementById('reader');

    indexView.style.display = 'none';
    reader.style.display = 'block';
    document.getElementById('reader-title').textContent = name;
    document.getElementById('reader-body').innerHTML =
      '<div class="state-msg"><span class="loading-dots">Loading</span></div>';
    window.scrollTo(0, 0);

    try {
      const res = await fetch(rawUrl);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const md  = await res.text();
      document.getElementById('reader-body').innerHTML = marked.parse(md);
    } catch (e) {
      document.getElementById('reader-body').innerHTML =
        `<div class="state-msg">⚠ Could not load chapter.<br><small>${e.message}</small></div>`;
    }
  }

  /* ── Back button ───────────────────────────────────────────────── */
  document.getElementById('back-btn').addEventListener('click', () => {
    document.getElementById('reader').style.display = 'none';
    document.getElementById('index-view').style.display = 'block';
    window.scrollTo(0, 0);
  });

  /* ── Scroll-to-top button ──────────────────────────────────────── */
  const scrollTopBtn = document.getElementById('scroll-top');
  window.addEventListener('scroll', () => {
    scrollTopBtn.classList.toggle('visible', window.scrollY > 400);
  });
  scrollTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

  /* ── Boot ──────────────────────────────────────────────────────── */
  fetchChapters();
</script>
</body>
</html>
