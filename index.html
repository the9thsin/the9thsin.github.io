<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapters</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .chapter { margin: 5px 0; }
    </style>
</head>
<body>
    <h1>Chapters</h1>
    <button id="toggleSort">Toggle Sort Order</button>
    <div id="chapterList"></div>

    <script>
        const chapters = [];
        const chapterList = document.getElementById('chapterList');
        const toggleSortButton = document.getElementById('toggleSort');
        let ascending = false;

        // Populate chapters (mock data example)
        for (let i = 1; i <= 10; i++) {
            chapters.push(`chapter-${i}`);
        }

        // Function to display chapters
        function displayChapters() {
            chapterList.innerHTML = '';
            // Sort chapters
            const sortedChapters = chapters.sort((a, b) => ascending ? a.localeCompare(b) : b.localeCompare(a));
            sortedChapters.forEach(chapter => {
                const link = document.createElement('a');
                link.href = `/chapters/${chapter}`;
                link.textContent = chapter.replace('-', ' ') + '\n';
                link.className = 'chapter';
                chapterList.appendChild(link);
            });
        }

        // Toggle sort order
        toggleSortButton.addEventListener('click', () => {
            ascending = !ascending;
            displayChapters();
        });

        // Initial display
        displayChapters();
    </script>
</body>
</html>
